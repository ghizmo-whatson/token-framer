<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image + Frame Mixer</title>
  <link rel="stylesheet" href="./main.css" />
</head>
<body>
  <div class="lang-switch">
    <select id="langSelect" aria-label="Language">
      <option value="ru" selected>RU</option>
      <option value="en">ENG</option>
    </select>
  </div>
  <h1 id="appTitle">Image + Frame Mixer</h1>

  <main class="app">
    <section class="column">
      <div class="btn-row">
        <button id="pasteTokenBtn" class="btn" type="button">Вставить из буфера</button>
        <button id="undoTokenBtn" class="btn" type="button">Откатить изменения</button>
      </div>
      <label class="frame-tools">
        <input id="removeTokenColorCheck" type="checkbox" />
        <span id="removeTokenLabel">Кисть удаления на токене</span>
      </label>
      <div id="tokenBrushControls" class="frame-brush-controls">
        <div class="brush-modes">
          <label><input type="radio" name="tokenBrushMode" value="color" checked /> <span id="tokenModeColorLabel">Удаление цвета</span></label>
          <label><input type="radio" name="tokenBrushMode" value="local" /> <span id="tokenModeLocalLabel">Локальная очистка цвета</span></label>
          <label><input type="radio" name="tokenBrushMode" value="eraser" /> <span id="tokenModeEraserLabel">Ластик</span></label>
        </div>
        <div class="brush-size-row">
          <span id="tokenBrushLabel">Фиолетовая кисть: 30</span>
          <input id="tokenBrushSize" type="range" min="5" max="120" value="30" />
        </div>
        <div id="tokenLocalSizeRow" class="brush-size-row local-size-row">
          <span id="tokenLocalBrushLabel">Красная кисть: 15</span>
          <input id="tokenLocalBrushSize" type="range" min="3" max="120" value="15" />
        </div>
      </div>
      <div id="tokenDrop" class="drop-area">
        <canvas id="tokenCanvas" class="token-canvas"></canvas>
        <div id="tokenCursorOverlay" class="cursor-overlay"></div>
        <div id="tokenSampleCursorOverlay" class="cursor-overlay"></div>
        <div id="tokenDropPlaceholder" class="placeholder">Перетащите сюда изображение</div>
      </div>
    </section>

    <section class="column">
      <div class="center-controls">
        <select id="modeSelect" aria-label="Режим">
          <option value="offset">Смещение</option>
          <option value="mask">Маска</option>
        </select>
        <select id="scaleSelect" aria-label="Масштаб">
          <option value="50">50%</option>
          <option value="60">60%</option>
          <option value="70">70%</option>
          <option value="80">80%</option>
          <option value="90">90%</option>
          <option value="100" selected>100%</option>
          <option value="110">110%</option>
          <option value="120">120%</option>
          <option value="130">130%</option>
          <option value="140">140%</option>
          <option value="150">150%</option>
          <option value="160">160%</option>
          <option value="170">170%</option>
          <option value="180">180%</option>
          <option value="190">190%</option>
          <option value="200">200%</option>
        </select>
        <select id="tokenScaleSelect" aria-label="Масштаб токена">
          <option value="50">Токен 50%</option>
          <option value="60">Токен 60%</option>
          <option value="70">Токен 70%</option>
          <option value="80">Токен 80%</option>
          <option value="90">Токен 90%</option>
          <option value="100" selected>Токен 100%</option>
          <option value="110">Токен 110%</option>
          <option value="120">Токен 120%</option>
          <option value="130">Токен 130%</option>
          <option value="140">Токен 140%</option>
          <option value="150">Токен 150%</option>
          <option value="160">Токен 160%</option>
          <option value="170">Токен 170%</option>
          <option value="180">Токен 180%</option>
          <option value="190">Токен 190%</option>
          <option value="200">Токен 200%</option>
        </select>
      </div>

      <div id="brushControls" class="brush-controls">
        <span id="brushLabel">Кисть: 30</span>
        <input id="brushSize" type="range" min="5" max="120" value="30" />
      </div>

      <div id="previewWrap" class="preview-wrap">
        <canvas id="previewCanvas" class="preview-canvas"></canvas>
        <div id="cursorOverlay" class="cursor-overlay"></div>
        <div id="previewPlaceholder" class="placeholder">Здесь появится результат

После загрузки рамки можно двигать изображение мышью в центре.</div>
      </div>

      <button id="downloadBtn" class="btn" type="button" disabled>Скачать</button>
    </section>

    <section class="column">
      <div class="btn-row">
        <button id="pasteFrameBtn" class="btn" type="button">Вставить из буфера</button>
        <button id="undoFrameBtn" class="btn" type="button">Откатить изменения</button>
      </div>
      <label class="frame-tools">
        <input id="removeFrameColorCheck" type="checkbox" />
        <span id="removeFrameLabel">Кисть удаления на рамке</span>
      </label>
      <div id="frameBrushControls" class="frame-brush-controls">
        <div class="brush-modes">
          <label><input type="radio" name="frameBrushMode" value="color" checked /> <span id="frameModeColorLabel">Удаление цвета</span></label>
          <label><input type="radio" name="frameBrushMode" value="local" /> <span id="frameModeLocalLabel">Локальная очистка цвета</span></label>
          <label><input type="radio" name="frameBrushMode" value="eraser" /> <span id="frameModeEraserLabel">Ластик</span></label>
        </div>
        <div class="brush-size-row">
          <span id="frameBrushLabel">Фиолетовая кисть: 30</span>
          <input id="frameBrushSize" type="range" min="5" max="120" value="30" />
        </div>
        <div id="frameLocalSizeRow" class="brush-size-row local-size-row">
          <span id="frameLocalBrushLabel">Красная кисть: 15</span>
          <input id="frameLocalBrushSize" type="range" min="3" max="120" value="15" />
        </div>
      </div>
      <div id="frameDrop" class="drop-area">
        <canvas id="frameCanvas" class="frame-canvas"></canvas>
        <div id="frameCursorOverlay" class="cursor-overlay"></div>
        <div id="frameSampleCursorOverlay" class="cursor-overlay"></div>
        <div id="frameDropPlaceholder" class="placeholder">Перетащите сюда рамку</div>
      </div>
    </section>
  </main>

  <script src="./main.js" defer></script>
</body>
</html>
